<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FALCO — Projetos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');
:root{
  --cyan:#00f5ff;--green:#00ff88;--amber:#ffb700;--red:#ff3c5a;
  --purple:#b06aff;--blue:#4d9fff;--orange:#ff6b2b;
  --bg:#020810;--bg2:#060d1a;--bg3:#0a1628;
  --border:rgba(0,245,255,0.10);--borderB:rgba(0,245,255,0.30);
  --text:#c8e8ff;--dim:#5a7a9a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.02) 2px,rgba(0,0,0,.02) 4px);pointer-events:none;z-index:1000;}

/* HEADER */
header{background:linear-gradient(180deg,rgba(0,20,50,.95),rgba(2,8,16,.9));border-bottom:1px solid var(--borderB);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;backdrop-filter:blur(10px);}
.logo{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;color:var(--cyan);text-shadow:0 0 20px rgba(0,245,255,.6);letter-spacing:4px;}
.logo span{color:var(--amber);}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px;}
.back{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim);text-decoration:none;padding:3px 8px;border:1px solid var(--border);border-radius:4px;transition:.2s;}
.back:hover{border-color:var(--cyan);color:var(--cyan);}
#clock{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--cyan);}

/* RESUME BANNER */
#resume-banner{display:none;background:linear-gradient(90deg,rgba(0,245,255,.06),rgba(0,255,136,.04));border-bottom:1px solid rgba(0,245,255,.2);padding:7px 20px;font-size:11px;cursor:pointer;flex-shrink:0;}
#resume-banner:hover{background:linear-gradient(90deg,rgba(0,245,255,.1),rgba(0,255,136,.07));}

/* LAYOUT */
.workspace{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sb-label{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:var(--dim);padding:12px 14px 6px;text-transform:uppercase;}
.sb-proj{padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:.15s;border-bottom:1px solid rgba(255,255,255,.03);}
.sb-proj:hover{background:rgba(255,255,255,.03);}
.sb-proj.active{border-left-color:var(--cyan);background:rgba(0,245,255,.04);}
.sp-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.sp-icon{font-size:16px;}
.sp-name{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;flex:1;line-height:1.2;}
.sp-pct{font-family:'Share Tech Mono',monospace;font-size:9px;}
.sp-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;}
.sp-fill{height:100%;border-radius:2px;transition:width .6s;}
.sp-status{font-size:9px;color:var(--dim);margin-top:4px;font-family:'Share Tech Mono',monospace;}
.sp-status.doing{color:var(--cyan);}
.sp-status.focus{color:var(--green);}

/* MAIN CONTENT */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{padding:8px 16px;font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:2px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap;}
.tab:hover{color:var(--cyan);}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}

/* PANELS */
.panels{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.panel{display:none;flex:1;overflow-y:auto;padding:16px;}
.panel.active{display:flex;flex-direction:column;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* PROJECT HEADER */
.proj-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding:12px 16px;border-radius:8px;border:1.5px solid;flex-shrink:0;}
.ph-icon{font-size:28px;}
.ph-info{flex:1;}
.ph-name{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;}
.ph-stack{font-size:10px;color:var(--dim);margin-top:2px;font-family:'Share Tech Mono',monospace;}
.ph-pct{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;}
.ph-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;margin-top:6px;width:200px;}
.ph-fill{height:100%;border-radius:3px;}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex:1;}
.kcol{background:var(--bg2);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;min-height:0;}
.kcol-head{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.kc-title{font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:2px;flex:1;}
.kc-badge{font-family:'Share Tech Mono',monospace;font-size:9px;padding:1px 6px;border-radius:99px;}
.kcol-body{padding:8px;overflow-y:auto;flex:1;}

/* KANBAN COLUMN THEMES */
.kcol.done .kcol-head{background:rgba(0,255,136,.04);}
.kcol.done .kc-title{color:var(--green);}
.kcol.done .kc-badge{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.2);}
.kcol.doing .kcol-head{background:rgba(0,245,255,.04);}
.kcol.doing .kc-title{color:var(--cyan);}
.kcol.doing .kc-badge{background:rgba(0,245,255,.1);color:var(--cyan);border:1px solid rgba(0,245,255,.2);}
.kcol.next .kcol-head{background:rgba(255,183,0,.04);}
.kcol.next .kc-title{color:var(--amber);}
.kcol.next .kc-badge{background:rgba(255,183,0,.1);color:var(--amber);border:1px solid rgba(255,183,0,.2);}
.kcol.backlog .kcol-head{background:rgba(90,122,154,.04);}
.kcol.backlog .kc-title{color:var(--dim);}
.kcol.backlog .kc-badge{background:rgba(90,122,154,.1);color:var(--dim);border:1px solid rgba(90,122,154,.2);}

/* TASK CARD */
.tcard{background:var(--bg3);border:1px solid rgba(255,255,255,.05);border-radius:6px;padding:7px 9px;margin-bottom:5px;transition:.15s;position:relative;}
.tcard:last-child{margin-bottom:0;}
.tcard:hover{border-color:rgba(255,255,255,.12);}
.tcard.state-doing{border-color:rgba(0,245,255,.3);background:rgba(0,245,255,.04);}
.tcard.state-done{opacity:.55;}
.tcard.state-done .tc-title{text-decoration:line-through;color:var(--dim);}
.tc-row{display:flex;align-items:flex-start;gap:7px;}
.tc-check{width:14px;height:14px;border-radius:3px;border:1.5px solid;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:.15s;}
.tc-check:hover{opacity:.8;}
.tc-body{flex:1;min-width:0;}
.tc-title{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;}
.tc-desc{font-size:9px;color:var(--dim);margin-top:2px;line-height:1.5;}
.tc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.ttag{padding:1px 5px;border-radius:99px;font-size:7px;font-family:'Share Tech Mono',monospace;border:1px solid;}
.tc-actions{display:flex;gap:4px;margin-top:5px;opacity:0;transition:.15s;}
.tcard:hover .tc-actions{opacity:1;}
.tc-btn{font-size:8px;font-family:'Share Tech Mono',monospace;padding:2px 7px;border-radius:99px;border:1px solid;cursor:pointer;background:none;color:inherit;transition:.15s;}
.tc-btn:hover{background:rgba(255,255,255,.06);}

/* PLAN DO DIA */
.plan-wrap{display:grid;grid-template-columns:260px 1fr;gap:14px;flex:1;}
.timeline{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-y:auto;}
.tl-label{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:var(--dim);margin-bottom:10px;}
.tl-item{display:flex;gap:10px;padding:8px 6px;border-radius:6px;cursor:pointer;transition:.15s;margin-bottom:2px;}
.tl-item:hover{background:rgba(255,255,255,.03);}
.tl-item.sel{background:rgba(0,245,255,.04);border:1px solid rgba(0,245,255,.15);}
.tl-item.done-task{opacity:.5;}
.tl-item.done-task .tl-title{text-decoration:line-through;}
.tl-time{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim);min-width:38px;padding-top:1px;}
.tl-dot{width:8px;height:8px;border-radius:50%;border:2px solid;margin-top:3px;flex-shrink:0;}
.tl-body{flex:1;}
.tl-title{font-size:11px;font-weight:700;}
.tl-sub{font-size:9px;color:var(--dim);margin-top:1px;}
.tl-dur{font-family:'Share Tech Mono',monospace;font-size:8px;margin-top:2px;}
.task-detail{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;overflow-y:auto;}
.td-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;margin-bottom:4px;}
.td-sub{font-size:10px;color:var(--dim);margin-bottom:14px;font-family:'Share Tech Mono',monospace;}
.td-section{margin-bottom:12px;}
.td-label{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:var(--dim);margin-bottom:6px;}
.td-obj{font-size:12px;color:var(--text);line-height:1.7;}
.step{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px;}
.step:last-child{border:none;}
.step-n{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim);min-width:18px;padding-top:1px;}
.step-t{color:var(--text);line-height:1.5;flex:1;}
.done-step .step-t{text-decoration:line-through;color:var(--dim);}
.step-chk{width:12px;height:12px;border-radius:2px;border:1.5px solid rgba(255,255,255,.2);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:8px;}

@media(max-width:900px){.kanban{grid-template-columns:repeat(2,1fr)}.plan-wrap{grid-template-columns:1fr}}
@media(max-width:600px){.sidebar{display:none}}
</style>
</head>

// ESTADO (localStorage)
// ═══════════════════════════════════════
const STORE_KEY = 'falco_project_state_v2';
let state = {};
try { state = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e) { state = {}; }

function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function getTaskState(projId, taskId) {
  return (state[projId]?.tasks?.[taskId]) || null;
}

function setTaskState(projId, taskId, st) {
  if (!state[projId]) state[projId] = {tasks:{}, planSteps:{}, activeTask:null};
  if (!state[projId].tasks) state[projId].tasks = {};
  state[projId].tasks[taskId] = st;
  saveState();
}

function getStepState(projId, stepKey) {
  return (state[projId]?.planSteps?.[stepKey]) || false;
}

function setStepState(projId, stepKey, done) {
  if (!state[projId]) state[projId] = {tasks:{}, planSteps:{}, activeTask:null};
  if (!state[projId].planSteps) state[projId].planSteps = {};
  state[projId].planSteps[stepKey] = done;
  saveState();
}

function getActivePlanTask(projId) {
  return state[projId]?.activeTask || null;
}
function setActivePlanTask(projId, taskId) {
  if (!state[projId]) state[projId] = {tasks:{}, planSteps:{}, activeTask:null};
  state[projId].activeTask = taskId;
  state[projId].lastVisited = Date.now();
  saveState();
}

function setLastProject(projId) {
  state._lastProject = projId;
  if (!state[projId]) state[projId] = {tasks:{}, planSteps:{}, activeTask:null};
  state[projId].lastVisited = Date.now();
  saveState();
}

// RESUME BANNER
// ═══════════════════════════════════════
function buildResumeBanner() {
  // Find any project with a "doing" task that has custom state
  for (const proj of PROJECTS) {
    const ps = state[proj.id];
    if (!ps) continue;
    // check if any "doing" task was touched recently
    const doingTask = proj.kanban.doing[0];
    if (doingTask && ps.lastVisited) {
      const mins = Math.round((Date.now() - ps.lastVisited) / 60000);
      const timeStr = mins < 60 ? `${mins}min atrás` : `${Math.round(mins/60)}h atrás`;
      const banner = document.getElementById('resume-banner');
      banner.style.display = 'flex';
      banner.style.alignItems = 'center';
      banner.style.gap = '10px';
      banner.innerHTML = `
        <span style="font-size:14px">${proj.icon}</span>
        <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cyan)">RETOMAR:</span>
        <span style="font-size:11px;font-weight:700">${proj.name}</span>
        <span style="font-size:10px;color:var(--dim)">→ ${doingTask.title}</span>
        <span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim)">${timeStr}</span>
        <span style="margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 8px;border-radius:99px;background:rgba(0,245,255,.1);color:var(--cyan);border:1px solid rgba(0,245,255,.2)">clique para retomar →</span>
      `;
      banner.onclick = () => loadProject(proj.id);
      return;
    }
  }
}

// ═══════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════
function buildSidebar() {
  const el = document.getElementById('sidebar-list');
  el.innerHTML = '';
  PROJECTS.forEach(proj => {
    // Calc dynamic progress from kanban
    const ps = state[proj.id] || {};
    const tasks = ps.tasks || {};
    let doneCount = proj.kanban.done.length;
    let totalCount = proj.kanban.done.length + proj.kanban.doing.length + proj.kanban.next.length;
    // Count extra done from next/doing
    [...proj.kanban.doing, ...proj.kanban.next].forEach(t => {
      if (tasks[t.id] === 'done') doneCount++;
    });
    const dynPct = Math.min(100, Math.round((doneCount / Math.max(totalCount, 1)) * 100));
    const doingTasks = [...proj.kanban.doing, ...proj.kanban.next].filter(t => tasks[t.id] === 'doing');
    const isActive = currentProj?.id === proj.id;

    let statusText = 'aguardando';
    let statusClass = '';
    if (proj.kanban.doing.length > 0 || doingTasks.length > 0) {
      statusText = '● em andamento';
      statusClass = 'doing';
    }
    if (isActive) { statusText = '● foco atual'; statusClass = 'focus'; }

    const div = document.createElement('div');
    div.className = 'sb-proj' + (isActive ? ' active' : '');
    div.onclick = () => loadProject(proj.id);
    div.innerHTML = `
      <div class="sp-top">
        <span class="sp-icon">${proj.icon}</span>
        <span class="sp-name" style="color:${proj.color}">${proj.name}</span>
        <span class="sp-pct" style="color:${proj.color}">${proj.progress}%</span>
      </div>
      <div class="sp-bar"><div class="sp-fill" style="width:${proj.progress}%;background:${proj.color}"></div></div>
      <div class="sp-status ${statusClass}">${statusText}</div>
    `;
    el.appendChild(div);
  });
}

  if (!proj) return;
  currentProj = proj;
  setLastProject(projId);
  buildSidebar();

  if (document.getElementById('resume-banner').style.display !== 'none') {

// KANBAN
// ═══════════════════════════════════════
function renderKanban(proj) {
  const el = document.getElementById('panel-kanban');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');

  const ps = state[proj.id] || {};
  const tasks = ps.tasks || {};

  // Categorize: original + overrides
  const categorized = { done: [], doing: [], next: [], backlog: [] };

  ['done','doing','next','backlog'].forEach(col => {
    proj.kanban[col].forEach(task => {
      const override = tasks[task.id];
      if (override) categorized[override].push({...task, _orig: col});
      else categorized[col].push({...task, _orig: col});
    });
  });

  const colDefs = [
    { key:'done', label:'FEITO', cls:'done' },
    { key:'doing', label:'FAZENDO', cls:'doing' },
    { key:'next', label:'PRÓXIMO', cls:'next' },
    { key:'backlog', label:'BACKLOG', cls:'backlog' },
  ];

  el.innerHTML = `
    <div class="proj-header" style="border-color:${proj.borderColor};background:${proj.bgColor}">
      <span class="ph-icon">${proj.icon}</span>
      <div class="ph-info">
        <div class="ph-name" style="color:${proj.color}">${proj.name}</div>
        <div class="ph-stack">${proj.stack}</div>
        <div class="ph-bar"><div class="ph-fill" style="width:${proj.progress}%;background:${proj.color}"></div></div>
      </div>
      <div class="ph-pct" style="color:${proj.color}">${proj.progress}%</div>
    </div>
    <div class="kanban" style="flex:1">
      ${colDefs.map(col => `
        <div class="kcol ${col.cls}">
          <div class="kcol-head">
            <span class="kc-title">${col.label}</span>
            <span class="kc-badge">${categorized[col.key].length}</span>
          </div>
          <div class="kcol-body">
            ${categorized[col.key].map(task => renderTaskCard(proj.id, task, col.key)).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderTaskCard(projId, task, currentCol) {
  const stateLabel = { done: '✓', doing: '◉', next: '○', backlog: '·' };
  const stateColors = { done: 'var(--green)', doing: 'var(--cyan)', next: 'var(--amber)', backlog: 'var(--dim)' };
  const tagsHtml = (task.tags||[]).map(t => `<span class="ttag" style="border-color:${stateColors[currentCol]}40;color:${stateColors[currentCol]}">${t}</span>`).join('');

  // Actions: context-sensitive
  let actions = '';
  if (currentCol === 'next') actions = `
    <button class="tc-btn" style="border-color:rgba(0,245,255,.3);color:var(--cyan)" onclick="moveTask('${projId}','${task.id}','doing')">▶ Iniciar</button>
    <button class="tc-btn" style="border-color:rgba(0,255,136,.3);color:var(--green)" onclick="moveTask('${projId}','${task.id}','done')">✓ Concluir</button>
  `;
  if (currentCol === 'doing') actions = `
    <button class="tc-btn" style="border-color:rgba(0,255,136,.3);color:var(--green)" onclick="moveTask('${projId}','${task.id}','done')">✓ Concluído</button>
    <button class="tc-btn" style="border-color:rgba(90,122,154,.3);color:var(--dim)" onclick="moveTask('${projId}','${task.id}',null)">↩ Voltar</button>
  `;
  if (currentCol === 'done') actions = `
    <button class="tc-btn" style="border-color:rgba(90,122,154,.3);color:var(--dim)" onclick="moveTask('${projId}','${task.id}',null)">↩ Desfazer</button>
  `;
  if (currentCol === 'backlog') actions = `
    <button class="tc-btn" style="border-color:rgba(255,183,0,.3);color:var(--amber)" onclick="moveTask('${projId}','${task.id}','next')">↑ Próximo</button>
  `;

  const doneClass = currentCol === 'done' ? 'state-done' : '';
  const doingClass = currentCol === 'doing' ? 'state-doing' : '';

  return `
    <div class="tcard ${doneClass} ${doingClass}">
      <div class="tc-row">
        <div class="tc-check" style="border-color:${stateColors[currentCol]};color:${stateColors[currentCol]}"
             onclick="cycleTask('${projId}','${task.id}','${task._orig || currentCol}','${currentCol}')">${stateLabel[currentCol]}</div>
        <div class="tc-body">
          <div class="tc-title">${task.title}</div>
          ${task.desc ? `<div class="tc-desc">${task.desc}</div>` : ''}
          ${tagsHtml ? `<div class="tc-tags">${tagsHtml}</div>` : ''}
          <div class="tc-actions">${actions}</div>
        </div>
      </div>
    </div>
  `;
}

function moveTask(projId, taskId, newState) {
  if (newState === null) {
    // reset to original
    if (state[projId]?.tasks) delete state[projId].tasks[taskId];
    saveState();
  } else {
    setTaskState(projId, taskId, newState);
  }
  renderKanban(currentProj);
  buildSidebar();
}

function cycleTask(projId, taskId, origCol, currentCol) {
  const cycle = { 'next':'doing', 'doing':'done', 'done':null, 'backlog':'next' };
  const next = cycle[currentCol];
  moveTask(projId, taskId, next);
}

function renderTimelineItem(proj, task, active) {
  const ps = state[proj.id] || {};
  const steps = ps.planSteps || {};
  const stepsDone = task.steps ? task.steps.filter((_,i) => steps[`${task.id}_${i}`]).length : 0;
  const totalSteps = task.steps ? task.steps.length : 0;
  const allDone = totalSteps > 0 && stepsDone === totalSteps;

  return `
    <div class="tl-item ${active?'sel':''} ${allDone?'done-task':''}" onclick="selectPlanTask('${proj.id}','${task.id}')">
      <div class="tl-time">${task.time}</div>
      <div class="tl-dot" style="border-color:${task.color};${allDone?`background:${task.color}`:active?`background:${task.color}`:''}""></div>
      <div class="tl-body">
        <div class="tl-title" style="color:${active?task.color:'var(--text)'}">${task.title}</div>
        <div class="tl-sub">${task.sub}</div>
        <div class="tl-dur" style="color:${task.color}">${task.dur}${totalSteps>0?` · ${stepsDone}/${totalSteps} passos`:''}</div>
      </div>
    </div>
  `;
}

function renderPlanDetail(proj, task) {
  if (!task) return '<div style="padding:20px;color:var(--dim)">Selecione uma tarefa</div>';
  const ps = state[proj.id] || {};
  const steps = ps.planSteps || {};

  const stepsHtml = (task.steps || []).map((s, i) => {
    const key = `${task.id}_${i}`;
    const done = steps[key];
    return `
      <div class="step ${done?'done-step':''}">
        <div class="step-chk" style="border-color:${done?'var(--green)':'rgba(255,255,255,.2)'};background:${done?'rgba(0,255,136,.15)':'transparent'};color:var(--green)"
             onclick="toggleStep('${proj.id}','${key}')">${done?'✓':''}</div>
        <span class="step-n">${String(i+1).padStart(2,'0')}</span>
        <span class="step-t">${s}</span>
      </div>
    `;
  }).join('');

  return `
    <div class="td-title" style="color:${task.color}">${task.title}</div>
    <div class="td-sub">${task.sub} · ${task.dur}</div>
    <div class="td-section">
      <div class="td-label">OBJETIVO</div>
      <div class="td-obj">${task.obj}</div>
    </div>
    <div class="td-section">
      <div class="td-label">PASSOS — clique para marcar concluído</div>
      ${stepsHtml}
    </div>
  `;
}

function selectPlanTask(projId, taskId) {
  setActivePlanTask(projId, taskId);
  currentPlanTask = taskId;
  const proj = PROJECTS.find(p => p.id === projId);
  renderPlano(proj);
}

function toggleStep(projId, stepKey) {
  const current = getStepState(projId, stepKey);
  setStepState(projId, stepKey, !current);
  const proj = PROJECTS.find(p => p.id === projId);
  renderPlano(proj);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR');
}
updateClock(); setInterval(updateClock, 1000);

// Load last project or default to placar
const lastProjId = state._lastProject || 'placar';
const lastProj = PROJECTS.find(p => p.id === lastProjId) || PROJECTS[0];
currentProj = lastProj;

buildResumeBanner();
buildSidebar();
renderKanban(currentProj);
</script>
